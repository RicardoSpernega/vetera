<mat-card class="game-card">
  <img
    appImgFallback
    src="{{ game().backgroundImage }}"
    alt="Imagem do jogo"
    class="game-cover"
  />
  <div class="game-content">
    <h2>{{ game().name }}</h2>
    <p>{{ game().description || 'Sem descricao disponivel.' }}</p>
    <div class="game-actions">
      <button
        mat-flat-button
        color="primary"
        (click)="openAchievements()"
        [disabled]="game().achievements.length === 0"
      >
        Ver achievements ({{ game().achievements.length }})
      </button>
    </div>
  </div>
</mat-card>
