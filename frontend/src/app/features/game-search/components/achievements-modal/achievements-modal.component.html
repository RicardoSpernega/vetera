<h2 mat-dialog-title>{{ data.gameName }}</h2>

<div mat-dialog-content class="modal-content">
  @if (data.achievements.length === 0) {
    <p class="empty-state">Esse jogo nao possui achievements disponiveis.</p>
  } @else {
    <div class="achievements-grid">
      @for (achievement of data.achievements; track achievement.title + $index) {
        <mat-card class="achievement-card">
          <img
            appImgFallback
            src="{{ achievement.image }}"
            alt="Imagem da conquista"
            class="achievement-image"
          />

          <div class="achievement-copy">
            <h3>{{ achievement.title }}</h3>
            <p>{{ achievement.description || 'Sem descricao para esta conquista.' }}</p>
          </div>
        </mat-card>
      }
    </div>
  }
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close>Fechar</button>
</div>
